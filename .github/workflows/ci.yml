name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck server
        run: npm run typecheck

  smoke-test:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Start server and verify routes
        run: |
          cd apps/server
          bun server.ts &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3000/health | grep -q '"status":"ok"'
          curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/ | grep -q 200
          curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/public/index.css | grep -q 200
